services:
  api:
    build:
      context: ./fastapi_app
    container_name: week5-fastapi
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  streamlit:
    build:
      context: ./streamlit_app
    container_name: week5-streamlit
    environment:
      FASTAPI_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
